name: expense_tracker
description: Expense Tracker Apps.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=2.17.0 <3.0.0"
  flutter: 3.0.4

dependencies:
  bloc: ^8.0.3
  dartz: ^0.10.1
  equatable: ^2.0.3
  flutter:
    sdk: flutter
  flutter_bloc: ^8.0.1
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.5.3+2
  flutter_svg: ^1.0.3
  freezed_annotation: ^2.1.0
  get_it: ^7.2.0
  go_router: ^4.2.2
  google_fonts: ^3.0.1
  injectable: ^1.5.2
  intl: ^0.17.0
  json_annotation: ^4.5.0
  recase: ^4.0.0
  sizer: ^2.0.15
  uuid: ^3.0.6

dev_dependencies:
  bloc_test: ^9.0.3
  build_runner: ^2.1.7
  flutter_gen_runner: ^4.1.6
  flutter_test:
    sdk: flutter
  freezed: ^2.1.0+1
  injectable_generator: ^1.5.4
  json_serializable: ^6.1.5
  mocktail: ^0.3.0
  very_good_analysis: ^3.0.1

flutter_gen:
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/google_fonts/
